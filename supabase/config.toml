project_id = "karnaf-crm"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_confirmations = false

[functions.whatsapp-webhook]
verify_jwt = false

# Tier 8.A — Meta calls this with X-Hub-Signature-256, not a Supabase
# JWT. Must stay verify_jwt=false; the function does its own HMAC check.
[functions.instagram-webhook]
verify_jwt = false

# Make.com bridge — called by Make with x-api-key (MAKE_INTAKE_KEY),
# not a Supabase JWT. Does its own key check + signs/forwards to leads-intake.
[functions.make-intake]
verify_jwt = false

[functions.payment-webhook]
verify_jwt = false

[functions.webinar-events]
verify_jwt = false

[functions.whatsapp-router-options]
verify_jwt = true

[functions.runtime-config]
verify_jwt = true

[functions.provider-status-webhook]
verify_jwt = false

[functions.leads-intake]
verify_jwt = false

[functions.website-leads-intake]
verify_jwt = false

[functions.sla-worker]
verify_jwt = false

[functions.daily-sales-inbox]
verify_jwt = false

[functions.automation-tick]
verify_jwt = false

[functions.dispatch-outbound]
verify_jwt = false

# Paced worker that fills the outbound queue from scheduled broadcasts.
# Auth via BROADCAST_DISPATCH_SECRET bearer, not a Supabase JWT.
[functions.broadcast-dispatch]
verify_jwt = false

[functions.orchestrate-message]
verify_jwt = false

[functions.admin-actions]
verify_jwt = true

[functions.send-reply]
verify_jwt = true

[functions.queue-resolve]
verify_jwt = true

[functions.dashboard-summary]
verify_jwt = true

[functions.lead-detail]
verify_jwt = true

[functions.leads-list]
verify_jwt = true

[functions.queue-list]
verify_jwt = true

[functions.nightly-jobs]
verify_jwt = false

[functions.analytics-summary]
verify_jwt = true

[functions.users-manage]
verify_jwt = true

[functions.prompt-variants]
verify_jwt = true

[functions.email-webhook]
verify_jwt = false

[functions.healthz]
verify_jwt = false

[functions.webhook-replay]
verify_jwt = true

[functions.pii-export]
verify_jwt = true

[functions.pii-delete]
verify_jwt = true

# ─────────────────────────────────────────────────────────────────────
# Every function directory MUST be registered here. An unregistered
# function defaults to verify_jwt=true at the gateway, which silently
# breaks any caller that authenticates with a non-JWT mechanism (Meta
# HMAC webhooks, shared-secret workers) on the next clean deploy.
# ─────────────────────────────────────────────────────────────────────

# Meta webhooks — X-Hub-Signature-256, no JWT. Own HMAC check inside.
[functions.fb-leadgen-webhook]
verify_jwt = false

# Legacy Instagram webhook still receiving Meta's subscription; being
# replaced by instagram-webhook (see docs/DEPLOY-fixes-post-pr44.md).
[functions.ig-webhook]
verify_jwt = false

# Internal workers — bearer = SLA_WORKER_SECRET (random secret, not a JWT).
[functions.ai-replay]
verify_jwt = false

[functions.ai-watchdog]
verify_jwt = false

[functions.internal-send-reply]
verify_jwt = false

# Cross-project provisioning — bearer = service-role key.
[functions.provision-student]
verify_jwt = false

# Operator endpoints — requireStaff (JWT). Declared explicitly so the
# registry stays complete even though true is the default.
[functions.ai-review]
verify_jwt = true

[functions.broadcasts]
verify_jwt = true

[functions.attention-inbox]
verify_jwt = true

[functions.automations]
verify_jwt = true

[functions.bulk-lead-actions]
verify_jwt = true

[functions.commissions]
verify_jwt = true

[functions.conversation-claims]
verify_jwt = true

[functions.journeys]
verify_jwt = true

[functions.lead-sources]
verify_jwt = true

[functions.landing-pages]
verify_jwt = true

[functions.leads-manage]
verify_jwt = true

[functions.message-templates]
verify_jwt = true

[functions.meta-template-status]
# Staff JWT normally; the nightly template-sync cron authenticates with
# the shared worker secret instead, so JWT verification happens in-function.
verify_jwt = false

[functions.partners]
verify_jwt = true

[functions.projects]
verify_jwt = true

[functions.reports]
verify_jwt = true

[functions.team-workload]
verify_jwt = true
